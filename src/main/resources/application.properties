# ========================
# SERVER
# ========================
server.port=${PORT:8080}
spring.application.name=dict-o-day

# ========================
# POSTGRESQL DATASOURCE
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dictoday}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:aswin@7070}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========================
# REDIS
# ========================
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
spring.data.redis.timeout=5000

# ========================
# JWT
# ========================
app.jwt.secret=${JWT_SECRET:dict-o-day-super-secret-key-for-jwt-signing-2026}
app.jwt.access-expiration-ms=3600000
app.jwt.refresh-expiration-ms=604800000

# ========================
# CORS
# ========================
app.cors.allowed-origins=*

# ========================
# GROQ AI (for AI tutor)
# ========================
app.groq.api-key=${GROQ_API_KEY:}
app.groq.base-url=https://api.groq.com/openai/v1
app.groq.model=llama-3.3-70b-versatile

# ========================
# FASTAPI MIDDLEWARE
# ========================
app.middleware.base-url=${MIDDLEWARE_URL:http://localhost:8000}
