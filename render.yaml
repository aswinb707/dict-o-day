services:
  # 1. Redis Instance
  - type: redis
    name: dict-o-day-redis
    plan: free
    region: oregon
    ipAllowList: []

  # 3. Spring Boot Backend
  - type: web
    name: dict-o-day-backend
    env: docker
    region: oregon
    plan: free
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: DB_HOST
        fromDatabase:
          name: dict-o-day-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: dict-o-day-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: dict-o-day-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: dict-o-day-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: dict-o-day-db
          property: password
      - key: REDIS_URL
        fromService:
          type: redis
          name: dict-o-day-redis
          property: connectionString
      - fromGroup: dict-o-day-shared
      - key: GROQ_API_KEY
        sync: false
      - key: MIDDLEWARE_URL
        value: https://dict-o-day-middleware.onrender.com

  # 4. FastAPI Middleware
  - type: web
    name: dict-o-day-middleware
    env: docker
    region: oregon
    plan: free
    dockerContext: ./middleware
    dockerfilePath: ./middleware/Dockerfile
    envVars:
      - key: SPRING_BOOT_URL
        value: https://dict-o-day-backend.onrender.com
      - key: REDIS_URL
        fromService:
          type: redis
          name: dict-o-day-redis
          property: connectionString
      - fromGroup: dict-o-day-shared
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: dict-o-day-db
    databaseName: dictoday
    plan: free
    region: oregon

envVarGroups:
  - name: dict-o-day-shared
    envVars:
      - key: JWT_SECRET
        generateValue: true

